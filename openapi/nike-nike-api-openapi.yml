openapi: 3.1.0
info:
  title: Nike Developer API
  description: >-
    Nike provides APIs for product catalog access, inventory, store locations, and e-commerce integration. The platform supports partners and developers building experiences around Nike products.
  version: '1.0'
  contact:
    name: Nike Developer Support
    url: https://developer.nike.com/
externalDocs:
  description: Documentation
  url: https://developer.nike.com/
servers:
  - url: https://api.nike.com
    description: Production
tags:
  - name: Retail
    description: Retail operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Retail
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
